<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#141C26"/>

  <!-- Outer glow ring -->
  <rect x="1" y="1" width="98" height="98" rx="21" fill="none" stroke="#DD9900" stroke-width="1.5" opacity="0.6"/>

  <!-- J -->
  <text
    x="32" y="70"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58"
    font-weight="700"
    fill="#DD9900"
    text-anchor="middle"
  >J</text>

  <!-- G -->
  <text
    x="70" y="70"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58"
    font-weight="700"
    fill="#F5C842"
    text-anchor="middle"
  >G</text>

  <!-- Bottom decorative line -->
  <line x1="18" y1="80" x2="82" y2="80" stroke="#DD9900" stroke-width="1.5" opacity="0.5"/>
  <circle cx="50" cy="80" r="2.5" fill="#F5C842"/>
</svg>
